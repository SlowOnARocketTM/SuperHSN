<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSN+</title>
    <style>
        :root {
            --background-dark: #121212;
            --background-light: #f5f5f5;
            --text-dark: white;
            --text-light: black;
            --card-dark: #1e1e1e;
            --card-light: #ffffff;
            --accent-color: #d50000;
        }
        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            transition: background 0.3s ease-in-out, color 0.3s ease-in-out;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: var(--text-dark);
            background: var(--accent-color);
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .theme-toggle {
            margin-bottom: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            font-size: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            justify-content: center;
        }
        .event {
            background: var(--card-dark);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .event:hover {
            transform: scale(1.05);
        }
        .event-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .typetitle {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .live-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: red;
            color: white;
            padding: 3px 6px;
            font-size: 10px;
            border-radius: 3px;
        }
        .fullscreen-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--background-dark);
            position: fixed;
            top: 0;
            left: 0;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fullscreen-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .fullscreen-container iframe {
            width: 80%;
            height: 80vh;
            border-radius: 10px;
        }
        .close-btn {
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .light-mode {
            background-color: var(--background-light);
            color: var(--text-light);
        }
        .light-mode .event {
            background: var(--card-light);
        }
    </style>
    <script>
        function openFullscreen(title, src) {
            document.querySelector(".container").style.display = "none";
            const fullscreen = document.querySelector(".fullscreen-container");
            document.getElementById("fullscreen-title").textContent = title;
            document.getElementById("fullscreen-iframe").src = src;
            fullscreen.style.display = "flex";
        }
        function closeFullscreen() {
            document.querySelector(".container").style.display = "block";
            document.querySelector(".fullscreen-container").style.display = "none";
            document.getElementById("fullscreen-iframe").src = "";
        }
        function toggleTheme() {
            document.body.classList.toggle("light-mode");
        }
        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                closeFullscreen();
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">HSN+</div>

        <br>
        <br>
        <div class="typetitle">Formula Sports(F1,F2,F3,F1 Academy)</div>
        <div class="grid">
            <div class="event" onclick="openFullscreen('Sky F1 24/7', 'https://embedsports.top/embed/alpha/sky-sports-f1-sky-f1/1')">
               
                <div class="event-title">Sky F1 24/7</div>
            </div>
        </div>
    </div>
    <div class="fullscreen-container">
        <div class="logo">HSN+</div>
        <div class="fullscreen-title" id="fullscreen-title"></div>
        <iframe id="fullscreen-iframe" allowfullscreen></iframe>
        <button class="close-btn" onclick="closeFullscreen()">Back to Events</button>
    </div>
</body>
</html>
